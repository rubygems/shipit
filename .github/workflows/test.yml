name: CI

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DB_HOST: 127.0.0.1
    steps:
      - uses: actions/checkout@v4

      - name: Install and start services
        run: docker compose up -d --wait

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run CI
        run: bin/ci
